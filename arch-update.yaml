---
- name: Update and potentially reboot Arch Linux hosts
  hosts: arch_hosts
  become: true

  tasks:
    - name: Upgrade all packages on Arch Linux
      ansible.builtin.command:
        cmd: pacman -Syyuu --noconfirm
      register: pacman_output
      changed_when: "'starting full system upgrade' in pacman_output.stdout"

    - name: Check if a reboot is needed
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: Reboot the machine if needed
      ansible.builtin.reboot:
        msg: "Rebooting due to package updates."
        connect_timeout: 5
        reboot_timeout: 300
        pre_reboot_delay: 0
        post_reboot_delay: 30
      when: reboot_required.stat.exists
